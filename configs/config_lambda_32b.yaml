# ConjLean — Lambda Labs A100 40 GB
# Model: Qwen/Qwen2.5-Math-32B-Instruct via local HuggingFace + bitsandbytes NF4
#
# VRAM budget:
#   32B × 0.5 bytes (NF4) ≈ 16 GB weights + ~4 GB activations/kv-cache = ~20 GB
#   Fits on A100-40GB with headroom. bf16 (64 GB) does NOT fit.
#
# Pre-flight:
#   1. huggingface-cli login          # refresh token (model is gated)
#   2. pip install bitsandbytes       # already installed on this instance
#   3. First run downloads ~65 GB to ~/.cache/huggingface/hub/
#      (disk has ~456 GB free — fine)
#
# Usage:
#   python3 run.py refute \
#     --config configs/config_lambda_32b.yaml \
#     --benchmark-dir data/benchmark \
#     --output data/results/e2_seed0_32b \
#     --max-rounds 10 --max-refinements 3 --max-concurrent 1 --seed 0

provider: local_hf

models:
  conjecture_gen: Qwen/Qwen2.5-Math-32B-Instruct
  formalizer: Qwen/Qwen2.5-Math-32B-Instruct
  proof_gen: Qwen/Qwen2.5-Math-32B-Instruct

api_keys:
  anthropic: ""
  openai: ""
  gemini: ""
  huggingface: ""  # set HF_TOKEN env var if model is gated

local_hf:
  model: "Qwen/Qwen2.5-Math-32B-Instruct"
  torch_dtype: "bfloat16"   # base dtype; bitsandbytes NF4 overrides at load time
  device_map: "auto"
  max_new_tokens: 4096
  load_in_4bit: true         # NF4 via bitsandbytes — requires bitsandbytes>=0.39
  load_in_8bit: false
  trust_remote_code: true

lean:
  project_dir: "./lean"
  build_timeout: 300
  repl_timeout: 30

pipeline:
  domains:
    - number_theory
    - inequality
  conjectures_per_domain: 100
  max_formalization_retries: 5
  max_proof_retries: 3

generation:
  temperature: 0.8
  batch_size: 20

proof_search:
  layer0_timeout: 5
  layer1_timeout: 30
  layer2_timeout: 60
  layer3_timeout: 120
  layer3_max_rounds: 3

output:
  save_dir: "./data/results"
  save_lean_proofs: true
  log_level: "INFO"
